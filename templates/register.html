{% extends 'base.html' %}

{% block title %}
Registro
{% endblock %}

{% block content %}

<div class="auth-shell">
    <div class="auth-copy">
        <p class="eyebrow mb-2">Nuevo usuario</p>
        <h1 class="display-6 fw-semibold mb-3">Crea tu acceso para gestionar proyectos y tareas</h1>
        <p class="text-secondary mb-0">El backend queda sencillo: Flask, SQLAlchemy y una base PostgreSQL online lista para desplegar.</p>
    </div>

    <div class="card app-card shadow-sm auth-card">
        <div class="card-body p-4 p-lg-5">
            <h2 class="h4 mb-4">Crear cuenta</h2>

            <form method="POST" class="row g-3">
                <div class="col-12">
                    <label class="form-label">Nombre</label>
                    <input type="text" name="nombre" class="form-control form-control-lg" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Correo</label>
                    <input type="email" name="email" class="form-control form-control-lg" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control form-control-lg" required>
                </div>
                <div class="col-12 d-grid">
                    <button class="btn btn-primary btn-lg">Registrarme</button>
                </div>
                <div class="col-12 text-center">
                    <a href="{{ url_for('login') }}">Ya tengo cuenta</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
